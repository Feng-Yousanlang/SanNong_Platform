server:
  port: 8080
  address: localhost

spring:
  config:
    import: optional:application-local.yml
  datasource:
    url: jdbc:mysql://localhost:3306/test?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# 文件上传配置
file:
  upload:
    base-path: springboot-quickstart/springboot-quickstart/uploads/
    avatar-path: avatars/
    product-img-path: productImages/
    access-base-url: http://localhost:8080/

# AI 配置：密钥请放到 application-local.yml 或环境变量，不要提交到 Git
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
