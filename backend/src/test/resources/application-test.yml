spring:
  config:
    import: optional:application-local.yml
  datasource:
    url: jdbc:h2:mem:agri_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  sql:
    init:
      mode: never
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload:
    base-path: ${java.io.tmpdir}/agri-uploads/
    avatar-path: avatars/
    product-img-path: productImages/
    access-base-url: http://localhost:8080/

deepseek:
  api-key: test-key
